name: Birdie
version: "0.2.0"
slug: birdie
description: Birdie LLM agent wired to the Home Assistant MCP Server
url: https://github.com/gkvas/birdie-haos-addon/tree/main/birdie
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
# Served in the HA sidebar; ttyd listens on 7681 inside the container.
ingress: true
ingress_port: 7681
panel_icon: mdi:robot-happy
panel_title: Birdie
# Persist ~/.birdie (sessions, long-term memory) across restarts/updates.
map:
  - addon_config:rw
options:
  vendor: mistral
  model: mistral-large-latest
  api_key: ""
  ha_url: http://homeassistant:8123
  ha_token: ""
  extra_skills: []
schema:
  vendor: list(anthropic|openai|mistral)
  model: str
  api_key: password
  ha_url: str
  ha_token: password
  extra_skills:
    - str
